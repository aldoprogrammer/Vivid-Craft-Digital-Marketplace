global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: vividcraft

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:3000"]
        labels: { service: api-gateway }

  - job_name: auth-service
    metrics_path: /metrics
    static_configs:
      - targets: ["auth-service:3001"]
        labels: { service: auth-service }

  - job_name: marketplace-service
    metrics_path: /metrics
    static_configs:
      - targets: ["marketplace-service:3002"]
        labels: { service: marketplace-service }

  - job_name: transaction-service
    metrics_path: /metrics
    static_configs:
      - targets: ["transaction-service:3003"]
        labels: { service: transaction-service }

  - job_name: image-processor
    metrics_path: /metrics
    static_configs:
      - targets: ["image-processor:5000"]
        labels: { service: image-processor }

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: mongodb-exporter
    static_configs:
      - targets: ["mongodb-exporter:9216"]

  # Blackbox synthetic probes against /health/ready endpoints.
  - job_name: blackbox-http-ready
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://api-gateway:3000/health/ready
          - http://auth-service:3001/health/ready
          - http://marketplace-service:3002/health/ready
          - http://transaction-service:3003/health/ready
          - http://image-processor:5000/health/ready
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

global:
  resolve_timeout: 5m
  smtp_smarthost: "mailpit:1025"
  smtp_from: "alerts@vividcraft.local"
  smtp_require_tls: false

route:
  receiver: mailpit
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: mailpit
    email_configs:
      - to: "oncall@vividcraft.local"
        send_resolved: true

inhibit_rules:
  - source_matchers: ["severity = critical"]
    target_matchers: ["severity = warning"]
    equal: ["service"]

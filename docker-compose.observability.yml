# VividCraft local observability stack.
# Run merged with the main compose so all services share the same project network:
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d
services:
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: vividcraft-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana:11.3.0
    container_name: vividcraft-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3005:3000"
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: vividcraft-alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    ports:
      - "9093:9093"
    volumes:
      - ./infra/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro

  loki:
    image: grafana/loki:3.2.1
    container_name: vividcraft-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./infra/observability/loki/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.2.1
    container_name: vividcraft-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/observability/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: vividcraft-blackbox-exporter
    restart: unless-stopped
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    ports:
      - "9115:9115"
    volumes:
      - ./infra/observability/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0
    container_name: vividcraft-redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.16.0
    container_name: vividcraft-postgres-exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-vividcraft}:${POSTGRES_PASSWORD:-vividcraft_secret}@postgres:5432/${POSTGRES_DB:-vividcraft_auth}?sslmode=disable"
    ports:
      - "9187:9187"

  mongodb-exporter:
    image: percona/mongodb_exporter:0.43.1
    container_name: vividcraft-mongodb-exporter
    restart: unless-stopped
    command:
      - --mongodb.uri=mongodb://${MONGO_INITDB_ROOT_USERNAME:-vividcraft}:${MONGO_INITDB_ROOT_PASSWORD:-vividcraft_secret}@mongodb:27017/?authSource=admin
      - --collect-all
    ports:
      - "9216:9216"

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
